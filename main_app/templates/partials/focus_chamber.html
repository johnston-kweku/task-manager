{% load static %}
<div class="w-full h-full flex flex-col items-center justify-center p-10 bg-slate-950/40" x-data="taskTimer({{ active_task.duration.total_seconds|default:0 }}, {{ active_task.id|default:0 }})">
    {% if active_task %}
    <div class="relative w-full max-w-4xl glass-panel p-12 rounded-2xl border border-cyan-500/40 shadow-[0_0_50px_rgba(0,242,255,0.1)] overflow-hidden">
        <!-- Background Decorations -->
        <div class="absolute top-0 right-0 p-4 opacity-20">
            <p class="text-[8px] font-mono text-cyan-500 text-right">
                COORDINATES: 40.7128° N, 74.0060° W<br>
                SECTOR: FOCUS_01<br>
                LEVEL: {{ active_task.priority_level }}
            </p>
        </div>

        <div class="flex flex-col items-center">
            <h1 class="text-4xl font-black text-white tracking-widest uppercase italic mb-2 text-glow">{{ active_task.name }}</h1>
            <p class="text-cyan-500/60 text-xs tracking-[0.5em] mb-12 uppercase">Neural Link Established</p>

            <div class="relative w-80 h-80 flex items-center justify-center mb-12">
                <svg class="w-full h-full transform -rotate-90">
                    <circle class="text-slate-900" cx="160" cy="160" fill="transparent" r="140" stroke="currentColor" stroke-width="8"></circle>
                    <circle class="glow-cyan transition-all duration-1000 ease-linear"
                            cx="160" cy="160" fill="transparent" r="140" :stroke="$store.chronos.activeTask.percent >= 90 ? '#ef4444' : '#00f2ff'"
                            stroke-dasharray="880"
                            :stroke-dashoffset="880 - ($store.chronos.activeTask.percent * 8.8)"
                            stroke-linecap="round" stroke-width="8"></circle>
                </svg>

                <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                    <span x-text="formatTime()" class="text-6xl font-black text-white tracking-tighter text-glow"></span>
                    <span x-text="$store.chronos.activeTask.percent + '%'" class="text-xl font-bold text-cyan-400/80 mt-2"></span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-8 w-full">
                <div class="glass-panel p-4 rounded border border-white/5 text-center">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Elapsed</p>
                    <p x-text="formatActiveTime()" class="text-white font-bold text-xl">00:00:00</p>
                </div>
                <div class="glass-panel p-4 rounded border border-white/5 text-center">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Status</p>
                    <p class="text-cyan-400 font-bold text-xl" :class="$store.chronos.activeTask.isRunning ? 'animate-pulse' : 'text-orange-500'">
                        <span x-text="$store.chronos.activeTask.isRunning ? 'SYNCHRONIZING' : 'STALLED'"></span>
                    </p>
                </div>
                <div class="glass-panel p-4 rounded border border-white/5 text-center">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Integrity</p>
                    <p class="text-white font-bold text-xl">98.4%</p>
                </div>
            </div>

            <div class="mt-12 flex gap-6">
                <button @click="window.dispatchEvent(new CustomEvent('toggle-active-pause'))" class="px-10 py-4 border border-cyan-500/50 text-cyan-400 font-bold tracking-[0.2em] hover:bg-cyan-500/10 transition-all uppercase">
                    <span x-text="$store.chronos.activeTask.isRunning ? 'Pause_Link' : 'Resume_Link'"></span>
                </button>
                <button @click="window.fetchPage('commandCenter')" class="px-10 py-4 bg-cyan-600 text-slate-950 font-bold tracking-[0.2em] hover:bg-cyan-500 transition-all uppercase">
                    Return_to_HQ
                </button>
            </div>
        </div>
    </div>
    {% else %}
    <div class="text-center">
        <h1 class="text-3xl font-black text-gray-700 tracking-widest mb-4">NO ACTIVE NEURAL LINK</h1>
        <button @click="window.fetchPage('commandCenter')" class="text-cyan-500 hover:text-cyan-300 tracking-widest uppercase underline decoration-cyan-500/30">
            Initialize from Command Center
        </button>
    </div>
    {% endif %}
</div>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    
</head>
<body x-data="user" class="font-mono bg-slate-950">
    <nav class="bg-slate-900/40 backdrop-blur-md w-full shadow-lg flex items-center justify-between shadow-sky-500 fixed top-0 left-0 p-4">
        <div class="flex gap-2">
            <p class="text-cyan-500 text-xl shadow-lg w-fit font-bold">
                NEURAL COMMAND
            </p>

            <input type="search" placeholder="QUERY SYSTEM..." class="bg-slate-800 border text-sm text-gray-500 px-3 shadow-sky-500 border-sky-500 rounded relative">

        </div>

        <div class="flex gap-5 *:cursor-pointer *:w-6 *:h-6 *:active:scale-95">
            <svg class="fill-gray-500 stroke-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>

            <svg class="stroke-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>

        </div>
    </nav>

    <aside class="w-64 h-full border-r fixed bg-slate-900/40 backdrop-blur-md top-16 left-0 border-cyan-400 flex flex-col">
        <div x-data="user"  class="w-full mb-10 pt-10 mx-auto flex flex-col items-center justify-center">
            <p class="text-xl text-cyan-500 font-bold ">
                NEURAL OS
            </p>
            <p class="text-gray-500 text-sm">
                ACTIVE SESSION: <span x-text="count"></span>
            </p>
        </div>

        <div class="flex flex-col items-start justify-center *:w-full *:p-4  *:cursor-pointer *:active:scale-95 *:hover:bg-slate-900 text-xs text-gray-600 text-left text-shadow-cyan-700">
            <button class="home-btn">
                COMMAND CENTER
            </button>
            <button>
                TASK NEBULA
            </button>
            <button>
                FOCUS CHAMBER
            </button>
            <button>
                TIMELINE MATRIX
            </button>
        </div>
        

    </aside>


    <script type="importmap">
    {
        "imports": {
            "alpinejs": "{% static 'js/vendor/module.esm.js' %}"
        }
    }
    </script>

    <script type="module" src="{% static 'js/index.js' %}" defer></script>


    {% block content %}{% endblock %}
</body>
</html>
